spring.application.name=smart-soil-backend
server.port=8080

# Default Database: MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/smart_soil_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
# Agar 'root' password se access denied aa raha hai, toh niche wali line ko khali rakho
spring.datasource.password=
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JPA / Hibernate properties
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update

# File Upload Limits
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Allow cleartext traffic for development
server.address=0.0.0.0
