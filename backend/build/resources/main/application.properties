spring.application.name=smart-soil-backend

# Local XAMPP MySQL Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/smart_soil_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate properties
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update

# Server
server.port=8080
server.address=0.0.0.0
